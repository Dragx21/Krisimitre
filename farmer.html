<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farmer Services</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Farmer Services</h1>
    <button id="addCropBtn">Add Crop</button>
    <div id="cropDetails"></div>
  </div>

  <script>
    document.getElementById('addCropBtn').addEventListener('click', function () {
      const cropType = prompt('Enter crop type:');
      const cropQuantity = prompt('Enter crop quantity:');
      if (cropType && cropQuantity) {
        document.getElementById('cropDetails').innerHTML = `<p>Crop: ${cropType}, Quantity: ${cropQuantity}</p>`;
      }
    });
  </script>
</body>
</html>
